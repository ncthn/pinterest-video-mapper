services:
  - type: web
    name: pinterest-video-mapper
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: mapper-data
      mountPath: /var/data
      sizeGB: 1
