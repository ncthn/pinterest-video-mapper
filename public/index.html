<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinterest Video Mapper</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Bynyla internal</p>
        <h1>Pinterest Video Mapper</h1>
      </div>
      <div class="actions">
        <a class="button secondary" href="/api/export.json">Export JSON</a>
        <a class="button" href="/api/export.csv">Export CSV</a>
      </div>
    </header>

    <main>
      <section class="controls">
        <input id="search" type="search" placeholder="Search pins or products" />
        <label><input id="unmappedOnly" type="checkbox" /> Unmapped only</label>
        <select id="logoFilter">
          <option value="">All logo statuses</option>
          <option value="unknown">Unknown</option>
          <option value="no_logo">No logo</option>
          <option value="logo">Logo</option>
        </select>
        <span id="count"></span>
      </section>
      <section id="rows" class="rows"></section>
      <button id="loadMore" class="load-more" type="button">Load more</button>
    </main>

    <template id="row-template">
      <article class="pin-row">
        <div class="preview">
          <div class="video-shell">
            <video controls preload="none"></video>
            <button class="video-hitbox" type="button" aria-label="Play or pause video"></button>
          </div>
          <p class="speed-note">2x speed by default. Hover or tap to scrub.</p>
        </div>
        <div class="meta">
          <a class="pin-title" target="_blank" rel="noreferrer"></a>
          <p class="pin-description"></p>
          <p class="pin-id"></p>
        </div>
        <div class="mapping">
          <div class="segmented" role="group" aria-label="Logo status">
            <button data-logo="unknown">Unknown</button>
            <button data-logo="no_logo">No logo</button>
            <button data-logo="logo">Logo</button>
          </div>
          <div class="segmented" role="group" aria-label="Text status">
            <button data-text-status="unknown">Text?</button>
            <button data-text-status="no_text">No text</button>
            <button data-text-status="has_text">Has text</button>
          </div>
          <div class="segmented" role="group" aria-label="Text language">
            <button data-text-language="unknown">Lang?</button>
            <button data-text-language="english">English</button>
            <button data-text-language="not_english">Not English</button>
          </div>
          <div class="product-picker">
            <div class="selected-products"></div>
            <input class="product-search" type="search" placeholder="Search Bynyla bag..." />
            <div class="popular-products"></div>
            <div class="product-results"></div>
          </div>
          <textarea class="notes" placeholder="Notes"></textarea>
          <p class="save-status">Saved</p>
        </div>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
